{% if page.nav_key %}
  {% assign items = site.data.navigation[page.nav_key] %}
  {% if items %}
  <div class="subnav">
    <ul>
      {% for item in items %}
        {% if item.url contains '#' %}
      <li><a href="{{ item.url }}">{{ item.title }}</a></li>
        {% else %}
      <li><a href="{{ item.url | relative_url }}">{{ item.title }}</a></li>
        {% endif %}
      {% endfor %}
    </ul>
  </div>
  {% endif %}
{% endif %}
